<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游天下 — 世界地图</title>
    <script src="../common/js/ui-theme.js"></script>
    <link rel="stylesheet" href="../common/css/style.css">
</head>
<body class="fade-in">
    <div class="map-container">
        <div class="cloud-ornament top-left"></div>
        <div class="cloud-ornament top-right"></div>
        <div class="cloud-ornament bottom-left"></div>
        <div class="cloud-ornament bottom-right"></div>
        <div class="map-border"></div>
        <div class="map-border-inner"></div>

        <h1 class="map-title">天 下 舆 图</h1>
        <div class="map-subtitle">W O R L D &nbsp; M A P</div>

        <button class="back-btn" onclick="window.location.href='home.html'">◁ 返回主页</button>

        <svg id="mapSvg" class="map-svg" preserveAspectRatio="xMidYMid meet">
            <rect class="ocean" width="100%" height="100%" />
        </svg>

        <div class="loading" id="loading">载入中</div>

        <div class="tooltip" id="tooltip">
            <div class="tip-name"></div>
            <div class="tip-sub"></div>
            <div class="tip-hint"></div>
        </div>

        <div class="info-panel">
            <div class="legend-item">
                <div class="legend-color" style="background:var(--mountain);border-color:var(--border-ink);"></div>
                <span>国家关卡</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background:var(--cinnabar);border-color:var(--border-ink);"></div>
                <span>中国（点击展开省份）</span>
            </div>
        </div>
    </div>

    <script src="../data/world-data.js"></script>
    <script src="../common/js/country-geo-presets.js"></script>
    <script src="../common/js/ue-bridge.js"></script>
    <script src="shared/map-renderer.js"></script>
    <script src="shared/map-viewport.js"></script>
    <script src="world-map.js"></script>
</body>
</html>
